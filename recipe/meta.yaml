{% set name = "jinja_partials" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jinja_partials-{{ version }}.tar.gz
  sha256: e5f22d272bd47cb0652ca97ec17b9358a1b3daf30efbcabf3ca24c6b0d4923c9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - jinja2

test:
  imports:
    - jinja_partials
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mikeckennedy/jinja_partials
  summary: Simple reuse of partial HTML page templates in the Jinja template language for Python web frameworks.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Colelyman
